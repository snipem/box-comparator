<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Box Comparator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: #0f172a;
    font-family: 'Segoe UI', system-ui, sans-serif;
    user-select: none;
    display: flex;
    flex-direction: column;
  }

  /* ── Two-pane layout ── */
  #views {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  .view {
    position: relative;
    flex: 1;
    overflow: hidden;
    background-image:
      linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 20px 20px;
  }

  #view-front { border-right: 2px solid rgba(255,255,255,0.12); }

  .view-title {
    position: absolute;
    top: 10px;
    left: 12px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    pointer-events: none;
    z-index: 1;
  }

  /* ── Boxes ── */
  .box {
    position: absolute;
    border: 2px solid;
    border-radius: 4px;
    cursor: grab;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: visible;
    min-width: 30px;
    min-height: 8px;
  }

  .box:hover { filter: brightness(1.2); }
  .box.dragging { cursor: grabbing; z-index: 999 !important; }

  .box-label {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    pointer-events: none;
    white-space: nowrap;
  }

  .box-name {
    font-weight: 700;
    font-size: 13px;
    color: #fff;
    text-shadow: 0 1px 4px rgba(0,0,0,0.9), 0 0 8px rgba(0,0,0,0.6);
  }

  .box-dims {
    font-size: 11px;
    color: rgba(255,255,255,0.85);
    text-shadow: 0 1px 3px rgba(0,0,0,0.9);
    margin-top: 2px;
  }

  .box-del {
    position: absolute;
    top: -10px;
    right: -10px;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: rgba(0,0,0,0.7);
    color: #fff;
    font-size: 13px;
    line-height: 20px;
    text-align: center;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 10;
  }

  .box:hover .box-del { opacity: 1; }
  .box-del:hover { background: #e74c3c; }

  /* ── Panel ── */
  #panel {
    position: fixed;
    top: 16px;
    right: 16px;
    background: rgba(255,255,255,0.97);
    border-radius: 14px;
    padding: 20px;
    width: 230px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    z-index: 2000;
  }

  #panel h2 {
    font-size: 15px;
    font-weight: 700;
    color: #0f172a;
    margin-bottom: 14px;
    letter-spacing: 0.02em;
  }

  #name-input {
    width: 100%;
    padding: 8px 10px;
    border: 1.5px solid #e2e8f0;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 8px;
    color: #0f172a;
    outline: none;
  }

  #name-input:focus { border-color: #3b82f6; }

  .dim-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 6px;
  }

  .dim-row label {
    font-size: 12px;
    font-weight: 600;
    color: #64748b;
    width: 14px;
    flex-shrink: 0;
  }

  .dim-row input {
    flex: 1;
    padding: 6px 8px;
    border: 1.5px solid #e2e8f0;
    border-radius: 7px;
    font-size: 13px;
    color: #0f172a;
    outline: none;
    min-width: 0;
  }

  .dim-row input:focus { border-color: #3b82f6; }

  .dim-row span {
    font-size: 11px;
    color: #94a3b8;
    flex-shrink: 0;
  }

  #add-btn {
    width: 100%;
    padding: 10px;
    background: #0f172a;
    color: #fff;
    border: none;
    border-radius: 9px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    margin-top: 6px;
    transition: background 0.15s;
  }

  #add-btn:hover { background: #1e3a5f; }
  #add-btn:active { background: #0a0f1e; }

  .divider {
    border: none;
    border-top: 1px solid #e2e8f0;
    margin: 14px 0 10px;
  }

  .scale-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .scale-row label {
    font-size: 12px;
    color: #64748b;
    flex-shrink: 0;
  }

  #scale-input {
    width: 60px;
    padding: 5px 7px;
    border: 1.5px solid #e2e8f0;
    border-radius: 6px;
    font-size: 12px;
    color: #0f172a;
    outline: none;
  }

  #scale-input:focus { border-color: #3b82f6; }

  .scale-row span {
    font-size: 11px;
    color: #94a3b8;
  }

  #hint {
    font-size: 10px;
    color: #94a3b8;
    text-align: center;
    margin-top: 10px;
    line-height: 1.5;
  }

  #count {
    font-size: 11px;
    color: #64748b;
    text-align: center;
    margin-top: 4px;
  }
</style>
</head>
<body>

<div id="views">
  <div id="view-front" class="view">
    <div class="view-title">Front — W × H</div>
  </div>
  <div id="view-top" class="view">
    <div class="view-title">Top — W × D</div>
  </div>
</div>

<div id="panel">
  <h2>📦 Box Comparator</h2>

  <input type="text" id="name-input" placeholder="Name (optional)">

  <div class="dim-row">
    <label>W</label>
    <input type="number" id="x-input" placeholder="0" min="1" step="any">
    <span>mm</span>
  </div>
  <div class="dim-row">
    <label>H</label>
    <input type="number" id="y-input" placeholder="0" min="1" step="any">
    <span>mm</span>
  </div>
  <div class="dim-row">
    <label>D</label>
    <input type="number" id="z-input" placeholder="0" min="0" step="any">
    <span>mm</span>
  </div>

  <button id="add-btn">+ Add Box</button>

  <hr class="divider">

  <div class="scale-row">
    <label>Scale:</label>
    <input type="number" id="scale-input" value="2" min="0.05" max="50" step="0.05">
    <span>px / mm</span>
  </div>

  <div id="hint">Scroll on either pane to zoom<br>Drag boxes to move</div>
  <div id="count"></div>
</div>

<script>
  const viewFront = document.getElementById('view-front');
  const viewTop   = document.getElementById('view-top');
  const scaleInput = document.getElementById('scale-input');
  const countEl   = document.getElementById('count');

  const PALETTE = [
    '#e74c3c','#3b82f6','#22c55e','#f59e0b','#a855f7',
    '#06b6d4','#f97316','#ec4899','#10b981','#6366f1'
  ];

  let colorIdx = 0;
  let boxCount = 0;
  let boxes = []; // { elFront, elTop, x, y, z, name, color }

  function getScale() {
    return Math.max(0.05, parseFloat(scaleInput.value) || 2);
  }

  // ── Create one box DOM element ─────────────────────────────────────────────

  function makeBoxEl({ name, dimLabel, color, pw, ph, posX, posY, zIndex, onDelete }) {
    const el = document.createElement('div');
    el.className = 'box';
    el.style.cssText = `
      left: ${posX}px; top: ${posY}px;
      width: ${pw}px; height: ${ph}px;
      border-color: ${color};
      background: ${color}28;
      z-index: ${zIndex};
    `;

    const label = document.createElement('div');
    label.className = 'box-label';

    const nameEl = document.createElement('div');
    nameEl.className = 'box-name';
    nameEl.textContent = name;

    const dimsEl = document.createElement('div');
    dimsEl.className = 'box-dims';
    dimsEl.textContent = dimLabel;

    const del = document.createElement('div');
    del.className = 'box-del';
    del.textContent = '×';
    del.title = 'Remove';
    del.addEventListener('click', e => { e.stopPropagation(); onDelete(); });

    label.appendChild(nameEl);
    label.appendChild(dimsEl);
    el.appendChild(label);
    el.appendChild(del);

    makeDraggable(el);
    return el;
  }

  // ── Add a box to both panes ────────────────────────────────────────────────

  function addBox() {
    const nameVal = document.getElementById('name-input').value.trim();
    const x = parseFloat(document.getElementById('x-input').value);
    const y = parseFloat(document.getElementById('y-input').value);
    const z = parseFloat(document.getElementById('z-input').value) || 0;

    if (!x || x <= 0 || !y || y <= 0) {
      flashInput(document.getElementById('x-input'));
      flashInput(document.getElementById('y-input'));
      return;
    }

    const name  = nameVal || `Box ${++boxCount}`;
    const color = PALETTE[colorIdx % PALETTE.length];
    colorIdx++;

    const scale  = getScale();
    const zIndex = 10 + boxes.length;

    // Front: W × H
    const fW = Math.max(30, Math.round(x * scale));
    const fH = Math.max(8,  Math.round(y * scale));
    const fX = 20 + Math.random() * Math.max(10, viewFront.clientWidth  - fW - 40);
    const fY = 20 + Math.random() * Math.max(10, viewFront.clientHeight - fH - 40);

    // Top: W × D
    const tW = Math.max(30, Math.round(x * scale));
    const tH = Math.max(8,  z > 0 ? Math.round(z * scale) : 10);
    const tX = 20 + Math.random() * Math.max(10, viewTop.clientWidth  - tW - 40);
    const tY = 20 + Math.random() * Math.max(10, viewTop.clientHeight - tH - 40);

    const dimFront = z ? `${x}×${y}×${z}` : `${x}×${y}`;
    const dimTop   = z ? `${x}×${z}` : `${x}×?`;

    let entry; // filled below so onDelete can reference it

    const elFront = makeBoxEl({
      name, dimLabel: dimFront, color, pw: fW, ph: fH,
      posX: fX, posY: fY, zIndex,
      onDelete: () => removeBox(entry)
    });

    const elTop = makeBoxEl({
      name, dimLabel: dimTop, color, pw: tW, ph: tH,
      posX: tX, posY: tY, zIndex,
      onDelete: () => removeBox(entry)
    });

    entry = { elFront, elTop, x, y, z, name, color };
    boxes.push(entry);

    viewFront.appendChild(elFront);
    viewTop.appendChild(elTop);

    document.getElementById('name-input').value = '';
    document.getElementById('name-input').focus();
    updateCount();
  }

  function removeBox(entry) {
    boxes = boxes.filter(b => b !== entry);
    entry.elFront.remove();
    entry.elTop.remove();
    updateCount();
  }

  function flashInput(input) {
    input.style.borderColor = '#e74c3c';
    setTimeout(() => { input.style.borderColor = ''; }, 600);
  }

  // ── Drag ──────────────────────────────────────────────────────────────────

  function makeDraggable(el) {
    el.addEventListener('mousedown', e => {
      if (e.target.classList.contains('box-del')) return;
      e.preventDefault();

      const startX = e.clientX, startY = e.clientY;
      const startL = parseFloat(el.style.left) || 0;
      const startT = parseFloat(el.style.top)  || 0;

      el.classList.add('dragging');
      el.style.zIndex = 999;

      const onMove = e => {
        el.style.left = (startL + e.clientX - startX) + 'px';
        el.style.top  = (startT + e.clientY - startY) + 'px';
      };

      const onUp = () => {
        el.classList.remove('dragging');
        el.style.zIndex = '';
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      };

      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  }

  // ── Scale ─────────────────────────────────────────────────────────────────

  function applyScale() {
    const scale = getScale();
    boxes.forEach(({ elFront, elTop, x, y, z }) => {
      elFront.style.width  = Math.max(30, Math.round(x * scale)) + 'px';
      elFront.style.height = Math.max(8,  Math.round(y * scale)) + 'px';
      elTop.style.width    = Math.max(30, Math.round(x * scale)) + 'px';
      elTop.style.height   = Math.max(8,  z > 0 ? Math.round(z * scale) : 10) + 'px';
    });
  }

  scaleInput.addEventListener('input', applyScale);

  // Scroll to zoom on either pane
  [viewFront, viewTop].forEach(v => {
    v.addEventListener('wheel', e => {
      e.preventDefault();
      let s = getScale();
      const delta = e.deltaY < 0 ? 0.05 : -0.05;
      s = Math.round((s + delta) * 100) / 100;
      s = Math.max(0.05, Math.min(50, s));
      scaleInput.value = s;
      applyScale();
    }, { passive: false });
  });

  // ── Keyboard ──────────────────────────────────────────────────────────────

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.activeElement.closest('#panel')) {
      addBox();
    }
  });

  document.getElementById('add-btn').addEventListener('click', addBox);

  // ── Count ─────────────────────────────────────────────────────────────────

  function updateCount() {
    countEl.textContent = boxes.length
      ? `${boxes.length} box${boxes.length > 1 ? 'es' : ''} on canvas`
      : '';
  }
</script>
</body>
</html>
